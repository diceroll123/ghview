name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: j178/prek-action@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test --locked
        env:
          INSTA_UPDATE: "no"
          GH_CONFIG_DIR: /nonexistent-gh-config

      - name: Smoke test
        run: cargo run -- --help
